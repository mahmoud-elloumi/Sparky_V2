version: '3.8'

services:

  # ── SPARKY Backend API ────────────────────────────────────────────────────
  sparky-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sparky-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/app/database
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}
      - MISTRAL_VISION_MODEL=${MISTRAL_VISION_MODEL:-pixtral-12b-2409}
    restart: unless-stopped
    networks:
      - sparky-network

  # ── n8n Workflow Automation ───────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sparky-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=sparky2026
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Africa/Tunis
      # Variables accessibles dans les workflows n8n
      - SPARKY_API_URL=http://sparky-api:8000
      - ALERT_EMAIL=${ALERT_EMAIL:-admin@sparky.tn}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      - sparky-api
    restart: unless-stopped
    networks:
      - sparky-network

networks:
  sparky-network:
    driver: bridge

volumes:
  n8n_data:
